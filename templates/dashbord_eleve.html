<div class="main-content" style="margin-left:0; padding: 2rem;">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h1>Mon Espace Études</h1>
        <div class="badge">🔥 {{ user.points }} Points Récompense</div>
    </div>

    <div class="card" style="background: linear-gradient(135deg, #6366f1, #a855f7); color:white;">
        <h2>Prochain Devoir</h2>
        <p>Algorithmique - Fin dans 2 jours</p>
        <button class="btn-action" style="background:white; color:var(--primary);">Soumettre maintenant</button>
    </div>

    <h3>Mes Cours</h3>
    <div class="grid" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:20px;">
        {% for c in cours %}
        <div class="card">
            <h4>{{ c.titre }}</h4>
            <p>{{ c.description[:50] }}...</p>
            <a href="#" class="btn-action">Ouvrir</a>
        </div>
        {% endfor %}
    </div>
</div>
