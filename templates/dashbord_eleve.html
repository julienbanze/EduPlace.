{% extends "base.html" %}
{% block content %}
<div class="glass-card">
    <h1>Bienvenue, {{ user.nom }} 👋</h1>
    <p style="color: #94a3b8;">Statut : Élève | Classe : {{ user.classe }}</p>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px;">
        <div style="background: rgba(99, 102, 241, 0.1); padding: 20px; border-radius: 15px;">
            <h3>Mon Matricule</h3>
            <p style="font-size: 24px; font-weight: bold; color: #818cf8;">{{ user.matricule }}</p>
        </div>
        <div style="background: rgba(236, 72, 153, 0.1); padding: 20px; border-radius: 15px;">
            <h3>Cours & Notes</h3>
            <p>Accès bientôt disponible...</p>
        </div>
    </div>
</div>
{% endblock %}
