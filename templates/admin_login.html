<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Accès Administrateur | EduPlace</title>
    <style>
        body {
            margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            font-family: 'Segoe UI', sans-serif; color: white;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.05); padding: 40px; border-radius: 20px;
            backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.2); text-align: center; width: 320px;
        }
        h2 { color: #818cf8; margin-bottom: 25px; }
        input {
            width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 10px;
            border: 1px solid #334155; background: #0f172a; color: white; text-align: center;
        }
        button {
            width: 100%; padding: 12px; border-radius: 10px; border: none;
            background: linear-gradient(45deg, #4f46e5, #9333ea);
            color: white; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        button:hover { transform: scale(1.05); box-shadow: 0 0 15px #4f46e5; }
    </style>
</head>
<body>
    <div class="login-card">
        <div style="font-size: 40px; margin-bottom: 10px;">🔐</div>
        <h2>Espace Julien</h2>
        <form method="POST">
            <input type="password" name="admin_password" placeholder="Mot de passe Admin" required>
            <button type="submit">Déverrouiller</button>
        </form>
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <p style="color: #fb7185; margin-top: 15px;">{{ messages[0] }}</p>
          {% endif %}
        {% endwith %}
    </div>
</body>
</html>
