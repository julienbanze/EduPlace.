<!DOCTYPE html>
<html lang="fr">
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Espace Enseignant</title>
</head>
<body>
    <div class="sidebar">
        <h2>EduPlace IA</h2>
        <p>👨‍🏫 {{ user.nom }}</p>
        <p><small>Matière : {{ user.matiere }}</small></p>
        <hr>
        <a href="/logout" style="color:red">Déconnexion</a>
    </div>
    <div class="main-content">
        <h1>Tableau de bord Enseignant</h1>
        <div class="course-card">
            <h3>Publier un nouveau cours</h3>
            <form>
                <input type="text" placeholder="Titre de la vidéo">
                <input type="text" placeholder="Lien YouTube / URL">
                <button type="button" class="btn">Envoyer à la classe</button>
            </form>
        </div>
    </div>
</body>
</html>
