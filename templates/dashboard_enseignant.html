<!DOCTYPE html>
<html lang="fr">
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>EduPlace | Enseignant</title>
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <h2>EduPlace</h2>
            <p>👨‍🏫 Prof. {{ session.nom }}</p>
            <nav><br>
                <a href="#" class="btn" style="width: 80%;">+ Nouveau Cours</a><br><br>
                <a href="/logout" style="color: #ef4444;">Déconnexion</a>
            </nav>
        </aside>
        <main class="main">
            <h1>Gestion des Cours en Ligne</h1>
            <div class="course-card" style="padding: 20px;">
                <h3>Publier une nouvelle leçon</h3>
                <form action="/publier" method="POST">
                    <input type="text" name="titre" placeholder="Titre du cours (ex: Algorithmique)">
                    <input type="text" name="video" placeholder="Lien Vidéo (YouTube)">
                    <select name="classe_cible">
                        <option value="Bac 1 IA">Bac 1 IA</option>
                        <option value="Bac 2 IA">Bac 2 IA</option>
                    </select>
                    <button type="submit" class="btn">Mettre en ligne</button>
                </form>
            </div>
        </main>
    </div>
</body>
</html>
