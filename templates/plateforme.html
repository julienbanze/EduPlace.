<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>EduPlace | Ma Plateforme</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            padding: 40px;
        }
        .course-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        .course-card:hover { transform: translateY(-10px); }
        .course-card img { width: 100%; height: 200px; object-fit: cover; }
        .course-info { padding: 20px; color: #333; }
    </style>
</head>
<body style="background: #f0f2f5; font-family: 'Poppins', sans-serif;">
    <nav style="background: #6366f1; padding: 20px; color: white; text-align: center;">
        <h1>Tableau de Bord EduPlace</h1>
    </nav>
    
    <div class="dashboard-grid">
        {% for c in cours %}
        <div class="course-card">
            <img src="{{ c.img }}" alt="Cours">
            <div class="course-info">
                <h3>{{ c.titre }}</h3>
                <button style="background: #6366f1; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer;">Commencer</button>
            </div>
        </div>
        {% endfor %}
    </div>
</body>
</html>
