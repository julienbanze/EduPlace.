<!DOCTYPE html>
<html lang="fr">
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>EduPlace | Inscription</title>
</head>
<body class="auth-page">
    <div class="auth-card">
        <h1>Créer un compte</h1>
        <form action="/inscription" method="POST">
            <input type="text" name="nom" placeholder="Nom complet" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Mot de passe" required>
            <select name="role" id="role" onchange="checkRole()" required>
                <option value="Eleve">Je suis un Élève</option>
                <option value="Enseignant">Je suis un Enseignant</option>
            </select>
            <select name="classe" required>
                <option value="Bac 1 IA">Bac 1 IA</option>
                <option value="Bac 2 IA">Bac 2 IA</option>
            </select>
            <input type="text" name="matiere" id="matiere" placeholder="Matière (pour Prof)" style="display:none;">
            <button type="submit" class="btn">S'inscrire</button>
        </form>
        <p>Déjà inscrit ? <a href="/login">Se connecter</a></p>
    </div>
    <script>
        function checkRole() {
            var role = document.getElementById("role").value;
            document.getElementById("matiere").style.display = (role === "Enseignant") ? "block" : "none";
        }
    </script>
</body>
</html>
