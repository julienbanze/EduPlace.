<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Créer un compte - EduPlace</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h2>Créer un compte</h2>
        <form action="/inscription" method="POST">
            <input type="text" name="nom" placeholder="Nom complet" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Mot de passe" required>
            
            <select name="role">
                <option value="Eleve">Je suis un Élève</option>
                <option value="Professeur">Je suis un Professeur</option>
            </select>
            
            <input type="text" name="promotion" placeholder="Promotion (ex: BAC1)">
            <input type="text" name="matricule" placeholder="Matricule">
            
            <button type="submit">S'inscrire</button>
        </form>
    </div>
</body>
</html>
