<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}EduPlace{% endblock %}</title>
    <style>
        :root { --bg: #0f172a; --glass: rgba(255, 255, 255, 0.03); --grad: linear-gradient(45deg, #6366f1, #ec4899); }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Poppins', sans-serif; min-height: 100vh; }
        .navbar { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); padding: 15px 50px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .content { padding: 40px; }
        .glass-card { background: var(--glass); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); padding: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .btn-grad { background: var(--grad); color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; text-decoration: none; font-weight: bold; }
        .alert { padding: 15px; border-radius: 10px; margin-bottom: 20px; text-align: center; background: rgba(251, 113, 133, 0.2); color: #fb7185; }
    </style>
</head>
<body>
    <nav class="navbar">
        <h2 style="background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">EduPlace</h2>
        <div>
            {% if session.user_id %}
                <a href="/logout" style="color: #94a3b8; text-decoration: none;">Déconnexion</a>
            {% else %}
                <a href="/admin=julien" style="color: #6366f1; text-decoration: none; margin-right: 20px;">Admin</a>
            {% endif %}
        </div>
    </nav>
    <div class="content">
        {% with messages = get_flashed_messages() %}{% if messages %}
            {% for msg in messages %}<div class="alert">{{ msg }}</div>{% endfor %}
        {% endif %}{% endwith %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>
